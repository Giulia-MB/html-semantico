<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'HEART';
            src: url('fonts/HEART.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de format()

            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype (eot)
            - truetype-aat (Apple Advanced Typography)
            - svg (SVG fonts)
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'HEART', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ipsam odio, recusandae provident deleniti vero dolorum officiis at porro temporibus quae fuga saepe optio. Suscipit quae modi ipsa perferendis tenetur dolor.</p>
</body>
</html>
