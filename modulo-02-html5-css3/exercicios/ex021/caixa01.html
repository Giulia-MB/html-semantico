<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {/*elemento h1 é block-level*/
            background-color: lightblue;
            height: 300px;
            width: 300px;

            /*border-width: 10px;
            border-style: solid;
            border-color: darkblue;*/

            border: 10px solid darkblue;

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/

            /*padding: 10px 10px 10px 10px; -> Atalho para definir o padding de cada lado em uma única linha*/

            padding: 10px; /* -> Atalho para definir o padding de todos os lados em uma única linha*/

            /*padding: 10px 20px; -> Atalho para definir o padding 10px para top e bottom, e 20px para left e right */

            /*margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;*/

            /*margin: auto; -> Deixa a caixa no meio da tela (centralizada)*/

            margin: 20px auto 40px auto; /*-> centraliza margens da direita e esquerda E deixa 20px para cima e 40px para baixo*/

            /*margin: 20px 20px 40px 20px; -> Atalho para definir a margem de cada lado em uma única linha */

            /*outline-width: 5px;
            outline-style: dashed;
            outline-color: red;*/

            outline: 5px dashed red; /* Atalho para definir a borda de contorno em uma única linha */
        }

        a { /*elemento a é inline-level*/
            /*border-width: 10px;
            border-style: solid;
            border-color: green;*/

            border: 10px solid green;

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/

            padding: 10px; /* Atalho para definir o padding de todos os lados em uma única linha */
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixa inline-level</a>. Vamos descobrir como tudo isso funciona.</p>
</body>
</html>
